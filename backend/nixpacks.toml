# Railway / Nixpacks configuration for Passaroo backend.
# This file tells Railway exactly how to build and run the FastAPI service.

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
# Critical: Emergent's `emergentintegrations` package lives on a private PyPI index.
# We pass it as --extra-index-url so Railway's pip can resolve it.
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt",
]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2"
